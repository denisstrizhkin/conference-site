name: Build VM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ALPINE_MAKE_VM_IMAGE_VERSION: "0.13.3"
  ALPINE_MAKE_VM_IMAGE_SHA1: "f17ef4997496ace524a8e8e578d944f3552255bb"
  ALPINE_BRANCH: "3.21"
  IMAGE_SIZE: "4G"
  QCOW2_IMAGE: conference-site.qcow2
  VMDK_IMAGE: conference-site.vmdk

jobs:
  build-vm:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Load NBD kernel module (required by alpine-make-vm-image)
      # ------------------------------------------------------------------ #
      - name: Load nbd kernel module
        run: sudo modprobe nbd max_part=16

      # ------------------------------------------------------------------ #
      # 3. Install host dependencies
      # ------------------------------------------------------------------ #
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-utils \
            rsync \
            python3 \
            python3-pip

      # ------------------------------------------------------------------ #
      # 4. Download alpine-make-vm-image (pinned by SHA1)
      # ------------------------------------------------------------------ #
      - name: Download alpine-make-vm-image
        run: |
          wget -q "https://raw.githubusercontent.com/alpinelinux/alpine-make-vm-image/v${ALPINE_MAKE_VM_IMAGE_VERSION}/alpine-make-vm-image"
          echo "${ALPINE_MAKE_VM_IMAGE_SHA1}  alpine-make-vm-image" | sha1sum -c
          chmod +x alpine-make-vm-image

      # ------------------------------------------------------------------ #
      # 5. Pre-compute bcrypt hash for the admin password.
      #    The plain-text password never leaves the runner.
      # ------------------------------------------------------------------ #
      - name: Generate admin password hash
        id: hash
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          pip3 install --quiet passlib bcrypt
          HASH=$(python3 - <<'EOF'
          import os
          from passlib.hash import bcrypt
          print(bcrypt.hash(os.environ["ADMIN_PASSWORD"]))
          EOF
          )
          echo "::add-mask::$HASH"
          echo "admin_hash=$HASH" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------ #
      # 6. Assemble the rootfs skeleton that will be copied into the image.
      #    This is where we write settings.toml from secrets – it never
      #    touches the repository or any artifact in plain text form.
      # ------------------------------------------------------------------ #
      - name: Build rootfs skeleton
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          mkdir -p rootfs/app

          # Copy project source, excluding things that should not go in the VM
          rsync -a \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='data.db' \
            --exclude='settings.toml' \
            --exclude='vm/' \
            --exclude='.github/' \
            . rootfs/app/

          # Write settings.toml into the skeleton from GitHub Secrets.
          # This file only ever exists inside the VM disk image.
          # Use printf to avoid heredoc indentation leaking into the file.
          printf 'echo_sql = false\nshow_docs = false\njwt_secret = "%s"\njwt_algorithm = "HS256"\njwt_expire_minutes = 60\n' \
            "$JWT_SECRET" > rootfs/app/settings.toml

      # ------------------------------------------------------------------ #
      # 7. Build the Alpine QCOW2 image.
      #    alpine-make-vm-image mounts the image, installs packages, copies
      #    the rootfs skeleton, then runs configure.sh inside the chroot.
      #    No QEMU boot needed — fast (~32s).
      # ------------------------------------------------------------------ #
      - name: Build QCOW2 image
        env:
          ADMIN_PASSWORD_HASH: ${{ steps.hash.outputs.admin_hash }}
        run: |
          sudo -E ./alpine-make-vm-image \
            --image-format qcow2 \
            --image-size "$IMAGE_SIZE" \
            --branch "$ALPINE_BRANCH" \
            --packages "python3 curl ca-certificates sqlite openssl" \
            --fs-skel-dir rootfs \
            --fs-skel-chown root:root \
            --script-chroot \
            "$QCOW2_IMAGE" -- ./vm/configure.sh
          # Restore ownership so upload-artifact can read the image
          sudo chown "$(id -un)" "$QCOW2_IMAGE"

      # ------------------------------------------------------------------ #
      # 8. Convert QCOW2 → VMDK (flat / monolithicFlat for ESXi compat).
      #    streamOptimized has data corruption issues on ESXi.
      #    Compress the flat image to avoid uploading gigabytes of zeros.
      # ------------------------------------------------------------------ #
      - name: Convert QCOW2 to VMDK
        run: |
          qemu-img convert \
            -f qcow2 \
            -O vmdk \
            -o adapter_type=lsilogic,subformat=monolithicFlat \
            "$QCOW2_IMAGE" \
            "$VMDK_IMAGE"
          gzip -k "$VMDK_IMAGE"

      # ------------------------------------------------------------------ #
      # 9. Upload artifacts
      # ------------------------------------------------------------------ #
      - name: Upload QCOW2
        uses: actions/upload-artifact@v4
        with:
          name: conference-site-qcow2
          path: ${{ env.QCOW2_IMAGE }}
          retention-days: 14

      - name: Upload VMDK (gzipped)
        uses: actions/upload-artifact@v4
        with:
          name: conference-site-vmdk
          path: ${{ env.VMDK_IMAGE }}.gz
          retention-days: 14
